name: Automated Unity Package Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  release:
    if: contains(github.event.head_commit.message, '-release')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Increment Version in package.json
        id: version_bump
        run: |
          cd Assets/Voiceover
          # Get current version
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current Version: $CURRENT_VERSION"
          
          # Increment patch version (e.g., 1.0.0 -> 1.0.1)
          NEW_VERSION=$(npx semver $CURRENT_VERSION -i patch)
          echo "New Version: $NEW_VERSION"
          
          # Update package.json
          npm version $NEW_VERSION --no-git-tag-version
          
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Make git commit for new version
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Use sed to replace all standard version matches in our documents
          sed -Ei "s|releases/download/v[0-9a-zA-Z.-]+/VoiceOver-[0-9a-zA-Z.-]+\.unitypackage|releases/download/v${{ env.NEW_VERSION }}/VoiceOver-${{ env.NEW_VERSION }}.unitypackage|g" README.md docs/index.md
          sed -Ei "s/Download_v[0-9a-zA-Z.-]+-Unity_Package/Download_v${{ env.NEW_VERSION }}-Unity_Package/g" README.md
          sed -Ei "s/Download v[0-9a-zA-Z.-]+ Unity Package/Download v${{ env.NEW_VERSION }} Unity Package/g" README.md
          sed -Ei "s/Download Package \(v[0-9a-zA-Z.-]+\)/Download Package (v${{ env.NEW_VERSION }})/g" docs/index.md
          sed -Ei "s/Version-[0-9a-zA-Z.-]+-yellowgreen/Version-${{ env.NEW_VERSION }}-yellowgreen/g" README.md
          
          git add Assets/Voiceover/package.json README.md docs/index.md
          git commit -m "chore: bump version to ${{ env.NEW_VERSION }} and update download links [skip ci]"
          git push origin HEAD:${{ github.ref }}

      - name: Generate File List
        run: |
          find Assets/Voiceover -name \*.meta > metaList
          echo "Assets/Voiceover.meta" >> metaList

      - name: Generate Unity Package File
        uses: pCYSl5EDgo/create-unitypackage@master
        with:
          package-path: VoiceOver-${{ env.NEW_VERSION }}.unitypackage
          include-files: metaList

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.NEW_VERSION }}
          name: Release v${{ env.NEW_VERSION }}
          generate_release_notes: true
          files: |
            VoiceOver-${{ env.NEW_VERSION }}.unitypackage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
